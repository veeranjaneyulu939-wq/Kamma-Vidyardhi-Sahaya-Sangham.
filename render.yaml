services:
  - type: web
    name: kamma-hostel
    env: node
    buildCommand: npm install && npm run build && cd server && npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data
    disk:
      name: kamma-data
      mountPath: /data
      sizeGB: 1
